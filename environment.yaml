name: coil-sketching-4d
channels:
  - conda-forge
  - nvidia/label/cuda-11.3.1

dependencies:
  - python=3.9
  - numpy
  - matplotlib

  # Make CUDA 11.3 the environment target
  - cuda-version=11.3
  - cuda-toolkit=11.3

  # GPU libs (will resolve compatible builds with cuda-version)
  - cudnn
  - nccl

  # CuPy (conda-forge will pick a CUDA-11.3 compatible build when cuda-version is set)
  - cupy

  - pip
  - pip:
      - nibabel
      - jupyter
      - pynvml
      - antspyx
